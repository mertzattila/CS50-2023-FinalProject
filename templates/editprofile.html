{% extends "layout.html" %}
{% block body %}
<form action="/editprofile" method="post">
<div class="container-profile">
    <h1>Your Profile</h1>
    <div class="profile-info">
        <label>Username:</label><br>
        {% if message == "username" %}
        <label class="wrong">Wrong username</label><br>
        {% endif %}
        <input type="text" name="username" value="{{user["username"]}}">
    </div>
    <div class="profile-info">
        <label>Email:</label>
        <p>{{user["email"]}}</p>
    </div>
    <div class="profile-actions">
        <a href="/upload">Upload a New Game</a>
        <button style="background-color: #007BFF;" type="submit">Confirm</button>
    </div>
</div>
</form>
{% endblock %}
