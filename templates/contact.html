{% extends "layout.html" %}
{%block body %}
<body class="contact-page">
    <header class="contact-header">
        <h1 class="contact-title">Contact Us</h1>
        <p class="contact-description">We'd love to hear from you!</p>
    </header>

    <section class="contact-form-container">
        <h2 class="contact-form-title">Contact Form</h2>
        <form action="/contact" method="post">
            <label class="contact-label" for="name">Name:</label>
            {% if message=="name" %}
            <label class="wrong">No name</label>
            {% endif %}
            <input type="text" id="name" name="name" class="contact-input" required><br>

            <label class="contact-label" for="email">Email:</label>
            {% if message=="email" %}
            <label class="wrong">Not an email</label>
            {% endif %}
            <input type="email" id="email" name="email" class="contact-input" required><br>

            <label class="contact-label" for="message">Message:</label><br>
            {% if message=="message" %}
            <label class="wrong">No message</label>
            {% endif %}
            <textarea id="message" name="message" class="contact-textarea" rows="4" required></textarea><br>

            <input type="submit" value="Submit" class="contact-submit">
        </form>
    </section>

</body>
{% endblock %}
