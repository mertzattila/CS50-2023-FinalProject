{% extends "layout.html" %}
{% block body %}
<h1 style="color:aliceblue">My Games</h1>
<table class="table table-striped table-bordered table-hover">
    <thead class="thead-dark">
        <tr>
            <th>Title</th>
            <th>Edit</th>
            <th>Download</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody>
        {% for game in games %}
        <tr>
            <td>{{ game['name'] }}</td>
            <td><a href="/editgame/{{game["id"]}}">Edit</a></td>
            <td><a href="{{ url_for('download_file', filename=game["filename"]) }}">Download</a></td>
            <td>
                <form action="/mygames" method="POST">
                    <input name="delete" value="{{game["id"]}}" style="display: none;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
