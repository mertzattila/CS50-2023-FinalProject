{%extends "layout.html"%}
{%block body%}
<div class="game-login-container">
    <h2 class="game-login-title">Register</h2>
    <form action="/register" method="post" class="game-login-form">
        <div class="game-form-group">
            <label for="email" class="game-label">Email:</label>
            {%if message == "email"%}
            <label class="wrong">Not valid email</label>
            {% endif%}
            <input type="text"  name="email" class="game-input" required>
        </div>
        <div class="game-form-group">
            <label for="username" class="game-label">Username:</label>
            {%if message == "username"%}
            <label class="wrong">Username already in use</label>
            {%endif%}
            <input type="text"  name="username" class="game-input" required>
        </div>
        <div class="game-form-group">
            <label for="password" class="game-label">Password:</label>
            {%if message == "password"%}
            <label class="wrong">Please give a Password</label>
            {%endif%}
            <input type="password"  name="password" class="game-input" required>
        </div>
        <div class="game-form-group">
            <label for="confirmation" class="game-label">Confirmation Password:</label>
            {%if message == "confirmation"%}
            <label class="wrong">Password does not match</label>
            {%endif%}
            <input type="password"  name="confirmation" class="game-input" required>
        </div>
        <button type="submit" class="game-button">register</button>
    </form>
</div>
{%endblock%}
